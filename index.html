<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gatto e Topolino</title>
    <style>
        body { margin: 0; overflow: hidden; background: #a5d6a7; font-family: sans-serif; }
        #game-board { width: 100vw; height: 100vh; position: relative; touch-action: none; }
        .sprite { position: absolute; transition: all 0.5s linear; cursor: pointer; user-select: none; display: flex; align-items: center; justify-content: center; }
        .cat { font-size: 80px; z-index: 10; left: 50px; top: 50px; }
        .mouse { font-size: 50px; z-index: 5; transition: transform 0.2s; }
        .mouse:hover { transform: scale(1.4); }
    </style>
</head>
<body>
<div id="game-board"><div id="player-cat" class="sprite cat">🐱</div></div>

<script>
    const board = document.getElementById('game-board');
    const cat = document.getElementById('player-cat');
    const soundCat = new Audio('gatto.mp3');
    const soundMouse = new Audio('topo.mp3');
    let posX = 50, posY = 50;

    // 1. Movimento con le frecce
    window.addEventListener('keydown', (e) => {
        const step = 30;
        if (e.key === 'ArrowUp') posY -= step;
        if (e.key === 'ArrowDown') posY += step;
        if (e.key === 'ArrowLeft') posX -= step;
        if (e.key === 'ArrowRight') posX += step;
        updateCatPosition();
    });

    // 2. Camminata verso il mouse cliccato
    board.addEventListener('pointerdown', (e) => {
        posX = e.clientX - 40;
        posY = e.clientY - 40;
        updateCatPosition();
        // Controlliamo la collisione dopo che la "camminata" è finita (0.5s)
        setTimeout(checkCollision, 500);
    });

    function updateCatPosition() {
        cat.style.left = posX + 'px';
        cat.style.top = posY + 'px';
    }

    // 3. Suoni in sequenza (Prima topo, poi gatto)
    async function playSounds() {
        try {
            await soundMouse.play();
            soundMouse.onended = () => soundCat.play();
        } catch (e) { console.log("Clicca sulla pagina per attivare l'audio"); }
    }

    function checkCollision() {
        const mice = document.querySelectorAll('.mouse');
        const catRect = cat.getBoundingClientRect();
        mice.forEach(mouse => {
            const mRect = mouse.getBoundingClientRect();
            if (!(catRect.right < mRect.left || catRect.left > mRect.right || catRect.bottom < mRect.top || catRect.top > mRect.bottom)) {
                playSounds();
                mouse.remove();
                cat.innerHTML = '😸';
                setTimeout(() => { cat.innerHTML = '🐱'; createMouse(); }, 1000);
            }
        });
    }

    function createMouse() {
        const m = document.createElement('div');
        m.className = 'sprite mouse';
        m.innerHTML = '🐭';
        m.style.left = Math.random() * (window.innerWidth - 60) + 'px';
        m.style.top = Math.random() * (window.innerHeight - 60) + 'px';
        board.appendChild(m);
    }

    for(let i=0; i<3; i++) createMouse();
</script>
</body>
</html>
